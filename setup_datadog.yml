---

- name: Install Datadog Agent
  hosts: webservers
  become: true
  tasks:
    - name: Check Datadog configuration
      ansible.builtin.assert:
        that:
          - datadog_api_key is defined
          - datadog_api_key | length > 0
          - datadog_site is defined
          - datadog_site | length > 0
        fail_msg: "Set datadog_api_key and datadog_site before installing Datadog Agent"

    - name: Install Datadog Agent
      ansible.builtin.import_role:
        name: datadog.dd.agent
