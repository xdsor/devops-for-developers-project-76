---

- name: Prepare all servers
  hosts: all
  become: true
  vars:
    pip_install_packages:
      - name: docker
  pre_tasks:
    - name: Ensure apt cache directory exists
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
  roles:
    - geerlingguy.pip
    - geerlingguy.docker
  tasks:
    - name: Create user svcacc
      ansible.builtin.user:
        name: svcacc
        shell: /bin/bash
        groups: sudo,docker
        append: true

    - name: Set password for svcacc
      ansible.builtin.command:
        cmd: chpasswd
        stdin: "svcacc:{{ svcacc_password }}"
      changed_when: true
      no_log: true

    - name: Ensure .ssh directory exists for svcacc
      ansible.builtin.file:
        path: /home/svcacc/.ssh
        state: directory
        owner: svcacc
        group: svcacc
        mode: "0700"

    - name: Copy root authorized_keys to svcacc
      ansible.builtin.copy:
        src: /root/.ssh/authorized_keys
        dest: /home/svcacc/.ssh/authorized_keys
        owner: svcacc
        group: svcacc
        mode: "0600"
        remote_src: true
